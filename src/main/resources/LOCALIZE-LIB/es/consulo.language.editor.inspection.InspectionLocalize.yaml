inspection.command.line.explanation:
    text: |-
        Parámetros esperados: <project_file_path> <inspection_profile> <output_path> [<options>]
        <inspection_profile> -- nombre de un perfil configurado en el proyecto o localmente, o una ruta a un perfil de inspección; puede omitirse cuando se utiliza uno de -e|-profileName|-profilePath
        Opciones disponibles:
         -d <directory_path>  --  directorio a inspeccionar, el valor predeterminado es todo el proyecto
        -e                   --  utilizar el perfil de inspección configurado para el proyecto
        -v[0|1|2]            --  nivel de detalle. 0 - silencioso, 1 - detallado, 2 - máximo detalle
        -profileName         --  nombre de un perfil definido en el proyecto
        -profilePath         --  ruta absoluta a un archivo de perfil
        -format              --  formato de salida del informe. Uno de xml|json|plain, el valor predeterminado es xml
        -changes             --  inspeccionar cambios no confirmados e informar sobre nuevos problemas
