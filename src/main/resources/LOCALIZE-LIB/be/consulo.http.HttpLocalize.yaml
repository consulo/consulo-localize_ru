proxy.tunneling.disabled.warning:
    text: <html>Базавая аўтэнтыфікацыя проксі адключана для HTTPS-злучэнняў. HTTPS-злучэнні могуць не працаваць, калі проксі патрабуе аўтэнтыфікацыі. Каб дазволіць базавую аўтэнтыфікацыю проксі, дадайце <tt>-Djdk.http.auth.tunneling.disabledSchemes=""</tt> у файл параметраў віртуальнай машыны і перазапусціце.</html>
