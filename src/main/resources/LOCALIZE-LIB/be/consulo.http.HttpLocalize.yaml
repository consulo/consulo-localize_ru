    text: <html>Уласцівасць JVM <tt>java.net.useSystemProxies</tt> усталявана ў <tt>true</tt>. Гэта прывядзе да таго, што некаторыя сеткавыя выклікі будуць праходзіць праз проксі, вызначаны аперацыйнай сістэмай. Калі вы не плануеце выкарыстоўваць сістэмны проксі, адключыце гэту ўласцівасць.</html>
