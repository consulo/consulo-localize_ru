message.resource.patterns.format.changed:
    text: "Фармат шаблонаў рэсурсаў змяніўся.\n{0} не ўдалося пераўтварыць існуючыя рэгулярныя выразы:\n{1}\nУвядзіце радок шаблона ў новым фармаце.\nКожны шаблон рэсурсу можа змяшчаць наступныя сімвалы падстаноўкі:\n? - адзін сімвал\n* - нуль або больш сімвалаў\n! - адмаўленне шаблона (дазволена толькі ў пачатку шаблона)\nВыкарыстоўвайце ; (кропку з коскай) для падзелу шаблонаў рэсурсаў;\nЭкрануйце сімвал \"!\" зваротнай касой рысай (\"\\\").\nМагчыма, вам таксама спатрэбіцца змяніць налады шаблона праекта.\nНацісніце ''{2}'' для прыняцця ўведзеных шаблонаў, ''{3}'' для загрузкі шаблонаў па змаўчанні ў новым фармаце."
