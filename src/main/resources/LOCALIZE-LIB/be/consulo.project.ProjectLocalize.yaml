libraries.node.text.ide:
    text: "Бібліятэкі змяшчаюць класы, якія дадаюць розную функцыянальнасць у ваша прыкладанне. Бібліятэкі таксама ўключаюць зыходныя файлы і JavaDoc, якія дапамагаюць у распрацоўцы праекта.<br><br>IntelliJ IDEA выкарыстоўвае бібліятэкі для аўтадапаўнення кода, валідацыі, падсветкі памылак і г.д.<br><br>Глабальныя бібліятэкі даступны ва ўсім праекце і могуць выкарыстоўвацца ва ўсіх модулях. Акрамя таго, яны даступны ва ўсіх праектах, створаных лакальна на вашым камп'ютары.<br><br>Звярніце ўвагу, што глабальныя бібліятэкі недаступны для тых, з кім вы дзеліцеся праектам. Калі вы хочаце падзяліцца праектам з камандай, выкарыстоўвайце замест гэтага праектныя бібліятэкі.<br><br>Разгарніце вузел і выберыце падэлементы для кіравання глабальнымі бібліятэкамі.<br><br>Каб падключыць бібліятэку да модуля, выберыце модуль, націсніце ўкладку \"Залежнасці\", націсніце \"Дадаць\" і ўкажыце размяшчэнне бібліятэкі."
libraries.node.text.module:
    text: Бібліятэкі змяшчаюць класы, якія дадаюць розную функцыянальнасць у ваша прыкладанне. Бібліятэкі таксама ўключаюць зыходныя файлы і JavaDoc, якія дапамагаюць у распрацоўцы праекта.<br><br>IntelliJ IDEA выкарыстоўвае бібліятэкі для аўтадапаўнення кода, валідацыі, падсветкі памылак і г.д.<br><br>Бібліятэкі модуля даступны толькі з модуляў, да якіх яны падключаны. Разгарніце вузел і выберыце падэлементы для кіравання бібліятэкамі модуля.<br><br>Каб падключыць бібліятэку да модуля, выберыце модуль, націсніце ўкладку "Залежнасці", націсніце "Дадаць" і ўкажыце размяшчэнне бібліятэкі.
libraries.node.text.project:
    text: Бібліятэкі змяшчаюць класы, якія дадаюць розную функцыянальнасць у ваша прыкладанне. Бібліятэкі таксама ўключаюць зыходныя файлы і JavaDoc, якія дапамагаюць у распрацоўцы праекта.<br><br>IntelliJ IDEA выкарыстоўвае бібліятэкі для аўтадапаўнення кода, валідацыі, падсветкі памылак і г.д.<br><br>Праектныя бібліятэкі даступны ва ўсім праекце і могуць выкарыстоўвацца ва ўсіх модулях. Акрамя таго, яны даступны ўсім, з кім вы дзеліцеся праектам.<br><br>Разгарніце вузел і выберыце падэлементы для кіравання праектнымі бібліятэкамі.<br><br>Каб падключыць бібліятэку да модуля, выберыце модуль, націсніце ўкладку "Залежнасці", націсніце "Дадаць" і ўкажыце размяшчэнне бібліятэкі.
