inspection.command.line.explanation:
    text: |-
        Чаканыя параметры: <project_file_path> <inspection_profile> <output_path> [<options>]
        <inspection_profile> -- імя профілю ў праекце або лакальнай канфігурацыі або шлях да профілю інспекцый; можа быць прапушчаны пры выкарыстанні -e|-profileName|-profilePath
        Даступныя опцыі:
        -d <directory_path>  --  дырэкторыя для праверкі, па змаўчанні ўвесь праект
        -e                   --  выкарыстоўваць профіль інспекцый, настроены для праекта
        -v[0|1|2]            --  узровень падрабязнасці. 0 - ціхі, 1 - падрабязны, 2 - максімальна падрабязны
        -profileName         --  імя профілю, вызначанага ў праекце
        -profilePath         --  абсалютны шлях да профілю
        -format              --  фармат вываду справаздачы. адзін з xml|json|plain, па змаўчанні xml
        -changes             --  праверыць незакамічаныя змены і паведаміць пра новыя праблемы
