generate.ant.build.dialog.cyclic.modules.table.description:
    text: |-
        いくつかのモジュールは循環依存しています。
        ant ビルド スクリプトを生成するには、各依存関係の "main" (代表) モジュールを選択してください。
        循環内のすべてのモジュールのソース コードはメイン モジュールの出力フォルダにコンパイルされます。
        循環内のすべてのモジュールは、メイン モジュールに指定された JSDK を使用します。
        作成された jar アーカイブは、メイン モジュールの名前より命名されます。
