message.resource.patterns.format.changed:
    text: "リソース パターンのフォーマットが変更しました。\n{0} は既存の正規表現パターンの変換に失敗しました :\n{1}\n新しいフォーマットのパターン文字列を入力してください。\n各リソース パターンには次のワイルドカードを含めることができます :\n? - 1 文字\n* - ゼロまたはそれ以上の文字\n! - パターンの否定 (パターンの最初でのみ可)\nセミコロン (\";\") を使用してリソース パターンを分割。\nバックスラッシュ (\"\\\") で \"!\" 文字をエスケープ。\nまた、テンプレート プロジェクト設定を変更する必要があります。\n''{2}'' を押して入力したパターンを適用します。''{3}'' で新しいフォーマットにデフォルト パターンを読み込みます。"
