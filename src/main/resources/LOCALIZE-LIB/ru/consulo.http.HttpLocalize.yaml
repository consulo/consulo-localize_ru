  text: <html>JVM-свойство <tt>java.net.useSystemProxies</tt> имеет значение <tt>true</tt>. Из-за этого некоторые сетевые вызовы будут проходить через прокси-сервер, определённый в операционной системе. Если вы не собирались использовать системный прокси-сервер, пожалуйста, отключите это свойство.</html>
