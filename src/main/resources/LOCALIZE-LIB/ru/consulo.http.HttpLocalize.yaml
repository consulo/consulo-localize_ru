proxy.tunneling.disabled.warning:
  text: <html>Для HTTPS-соединений отключена базовая аутентификация прокси. HTTPS-соединения могут завершиться ошибкой, если прокси требует аутентификацию. Чтобы разрешить базовую аутентификацию прокси, добавьте <tt>-Djdk.http.auth.tunneling.disabledSchemes=""</tt> в файл параметров JVM и перезапустите программу.</html>